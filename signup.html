<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | MovieVerse</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<a href="index.html">

Movie<span>Verse</span>

</a>

</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="movies.html">Movies</a></li>

<li><a href="reviews.html">Reviews</a></li>

<li><a href="about.html">About</a></li>

<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

</header>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<h1>

Join MovieVerse 🎬

</h1>

<p>

Create your free account to rate movies, write reviews and build your personal watchlist.

</p>

<img src="assets/images/signup-banner.png" alt="Signup">

</div>

<div class="auth-right">

<h2>

Create Account

</h2>

<form id="signupForm">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
placeholder="Enter your full name"
required>

</div>

<div class="input-box">

<label>Username</label>

<input
type="text"
placeholder="Choose a username"
required>

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
placeholder="Enter your email"
required>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
placeholder="Create password"
required>

</div>

<div class="input-box">

<label>Confirm Password</label>

<input
type="password"
placeholder="Confirm password"
required>

</div>

<label class="remember">

<input type="checkbox" required>

I agree to the Terms & Conditions

</label>

<button class="auth-btn" type="submit">

Create Account

</button>

<p class="auth-text">

Already have an account?

<a href="login.html">

Login

</a>

</p>

<div class="divider">

<span>

OR

</span>

</div>

<div class="social-login">

<button>

<i class="fab fa-google"></i>

Sign Up with Google

</button>

<button>

<i class="fab fa-facebook-f"></i>

Sign Up with Facebook

</button>

</div>

</form>

</div>

</div>

</section>

<footer>

<div class="footer-bottom">

<p>

© 2026 MovieVerse. All Rights Reserved.

</p>

</div>

</footer>

<script src="js/main.js"></script>

</body>

</html>
